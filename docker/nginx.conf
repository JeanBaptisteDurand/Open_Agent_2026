# LPLens web — static SPA served by nginx in the prod web container.
# All non-asset paths fall back to index.html so React Router handles
# /atlas, /agent, /developers, /roadmap, /diagnose/:id, /report/:hash.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets (vite emits them with content hash)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every other route returns index.html so React Router
  # can take over client-side navigation.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Container-level health check — surfaced to docker compose healthcheck.
  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
  }
}
