[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[rpc_endpoints]
og_newton = "${OG_NEWTON_RPC}"
og_galileo = "${OG_GALILEO_RPC}"
sepolia = "${SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
# 0G chainscan does not yet expose a verifier-compatible API; left blank
# until the public verifier endpoint stabilises.

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"
